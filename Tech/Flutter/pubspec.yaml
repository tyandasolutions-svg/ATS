name: flutter_pos
description: "Mobile POS Application with Clean Architecture"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  freezed_annotation: ^2.4.4

  # Dependency Injection
  get_it: ^8.0.2
  injectable: ^2.5.0

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5

  # Cache & Settings
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Barcode Scanner
  mobile_scanner: ^5.2.3

  # Charts
  fl_chart: ^0.69.2

  # PDF & Print
  pdf: ^3.11.1
  printing: ^5.13.4

  # Thermal Printer - will be added when printer integration is done
  # esc_pos_utils has dependency conflict with printing, use alternative later
  # esc_pos_utils: ^1.1.0
  # bluetooth_print: add manually when needed

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  dartz: ^0.10.1
  equatable: ^2.0.7
  excel: ^4.0.6
  flutter_svg: ^2.0.16
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  freezed: ^2.5.7
  build_runner: ^2.4.13
  injectable_generator: ^2.6.2
  drift_dev: ^2.22.1
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
