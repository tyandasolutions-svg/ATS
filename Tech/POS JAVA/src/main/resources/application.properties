# Application
spring.application.name=POS System
server.port=8080

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:posdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# JWT Configuration
app.jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationInPOSSystem2024PleaseChangeInProduction
app.jwt.expiration=86400000

# Logging
logging.level.com.pos=DEBUG
