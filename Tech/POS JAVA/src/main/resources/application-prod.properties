# ============================================================
# Production Profile — activated with SPRING_PROFILES_ACTIVE=prod
# ============================================================

# PostgreSQL (values injected via environment variables)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=true

# Disable H2 console in production
spring.h2.console.enabled=false

# JWT
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Server
server.port=8080

# Logging — quieter in production
logging.level.com.pos=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
